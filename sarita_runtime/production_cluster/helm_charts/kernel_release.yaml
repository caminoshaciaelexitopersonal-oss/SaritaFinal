apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sarita-runtime-kernel
  namespace: sarita-production
spec:
  interval: 5m
  chart:
    spec:
      chart: sarita-kernel
      version: "1.0.0"
  values:
    replicas: 5
    resources:
      limits:
        cpu: "1000m"
        memory: "2Gi"
    env:
      DATABASE_URL: "secret:db-url"
      KAFKA_BROKERS: "kafka-prod:9092"
