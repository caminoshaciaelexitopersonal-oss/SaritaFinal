version: '3.8'
services:
  postgres:
    image: postgis/postgis:14-3.3
    environment:
      POSTGRES_DB: sarita_sovereign
      POSTGRES_USER: sarita_root
      POSTGRES_PASSWORD: sarita_password
    ports: ["5432:5432"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]

  financial-worker:
    build:
      context: ./sarita_runtime/live_platform/workers
      dockerfile: Dockerfile
    depends_on: [postgres, kafka]
    environment:
      DATABASE_URL: postgresql://sarita_root:sarita_password@postgres:5432/sarita_sovereign
      KAFKA_BROKERS: kafka:9092
