apiVersion: v1
kind: Namespace
metadata:
  name: sarita-runtime
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-worker
  namespace: sarita-runtime
spec:
  replicas: 3
  selector:
    matchLabels:
      app: financial-worker
  template:
    metadata:
      labels:
        app: financial-worker
    spec:
      containers:
      - name: worker
        image: sarita/financial-worker:latest
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: KAFKA_BROKERS
          value: "kafka-svc:9092"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
