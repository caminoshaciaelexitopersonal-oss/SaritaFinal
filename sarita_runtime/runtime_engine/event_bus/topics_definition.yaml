topics:
  - name: sarita.finance.events
    partitions: 6
    replication_factor: 1
    config:
      retention.ms: 604800000 # 7 days
  - name: sarita.ai.decisions
    partitions: 12
    replication_factor: 1
    config:
      retention.ms: 86400000 # 24h
  - name: sarita.telemetry.metrics
    partitions: 24
    replication_factor: 1
    config:
      retention.ms: 3600000 # 1h
  - name: sarita.governance.isolation
    partitions: 3
    replication_factor: 1
    config:
      cleanup.policy: compact
