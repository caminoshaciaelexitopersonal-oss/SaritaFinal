version: '3.8'
services:
  control-plane:
    build:
      context: .
      dockerfile: sarita_runtime/live_platform/workers/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on: [kafka, temporal]

  integration-fabric:
    build:
      context: .
      dockerfile: sarita_runtime/live_platform/workers/Dockerfile
    command: ["python", "sarita_runtime/runtime_integration/integration_bus.py"]
    depends_on: [kafka]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0

  temporal:
    image: temporalio/auto-setup:1.20.0
    environment:
      - DB=postgresql
      - POSTGRES_SEEDS=postgres
    depends_on: [postgres]

  postgres:
    image: postgis/postgis:14-3.3
    environment:
      POSTGRES_PASSWORD: ${SARITA_DB_PASSWORD:-sarita_dev_pass}
