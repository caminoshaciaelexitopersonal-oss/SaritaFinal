apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: sovereign-zero-trust
  namespace: sarita-production
spec:
  action: DENY
  rules:
  - from:
    - source:
        notPrincipals: ["cluster.local/ns/sarita-production/sa/*"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kernel-runtime-hpa
  namespace: sarita-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sarita-kernel
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
