# =============================================================================
# SARITA SOVEREIGN OS - EXECUTION PLANE GOVERNANCE
# Domain: Physical Coordination and Causal Routing
# =============================================================================

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sovereign-execution-plane
  namespace: sarita-runtime
spec:
  hosts:
  - sovereign-kernel.sarita.svc.cluster.local
  http:
  - match:
    - headers:
        x-scta-causal-link:
          exact: "VERIFIED"
    route:
    - destination:
        host: sovereign-kernel.sarita.svc.cluster.local
        subset: v58-actualized
  - route:
    - destination:
        host: sovereign-kernel.sarita.svc.cluster.local
        subset: fencing-fallback
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: runtime-mtls-fencing
  namespace: sarita-runtime
spec:
  mtls:
    mode: STRICT
