<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SARITA Desktop - Gestión Operativa</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 50px auto; }
        h1 { color: #1e3a8a; }
        p { color: #4b5563; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; background: #d1fae5; color: #065f46; font-size: 14px; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SARITA Desktop App</h1>
        <p>Solución de Escritorio para Gestión Operativa y Control de Acceso</p>
        <div id="status" class="status-badge">Esperando respuesta del API...</div>
        <p id="system-info" style="font-size: 12px; margin-top: 20px; color: #9ca3af;"></p>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
